<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Nexus Admin Panel</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: {
                                50: "#eef2ff",
                                100: "#e0e7ff",
                                200: "#c7d2fe",
                                300: "#a5b4fc",
                                400: "#818cf8",
                                500: "#6366f1",
                                600: "#4f46e5",
                                700: "#4338ca",
                                800: "#3730a3",
                                900: "#312e81",
                            },
                        },
                    },
                },
            };
        </script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        <style>
            .tab-active { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; }
            .fade-in { animation: fadeIn 0.3s ease; }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .stat-card { transition: all 0.3s ease; }
            .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(99, 102, 241, 0.15); }
            .btn-action { transition: all 0.2s ease; }
            .btn-action:hover { transform: scale(1.05); }
            .sidebar-link { transition: all 0.2s ease; }
            .sidebar-link:hover { padding-left: 1.25rem; }
            body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
            .table-row:hover { background-color: #f8fafc; }
            .modal-overlay { backdrop-filter: blur(4px); }
            ::-webkit-scrollbar { width: 6px; }
            ::-webkit-scrollbar-track { background: #f1f5f9; }
            ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 3px; }
        </style>
    </head>
    <body class="bg-gray-50 min-h-screen">
        <div id="app"></div>

        <script src="/admin/js/api.js"></script>
        <script src="/admin/js/auth.js"></script>
        <script src="/admin/js/ui.js"></script>
        <script src="/admin/js/dashboard.js"></script>
        <script src="/admin/js/users.js"></script>
        <script src="/admin/js/posts.js"></script>
        <script src="/admin/js/reports.js"></script>
        <script src="/admin/js/main.js"></script>
    </body>
</html>
