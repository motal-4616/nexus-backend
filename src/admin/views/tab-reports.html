<div id="tab-reports" class="tab-content hidden fade-in">

                <option value="pending" selected>Chờ xử lý</option>
                <option value="resolved">Đã giải quyết</option>
                <option value="dismissed">Đã bỏ qua</option>

        <table class="w-full">

                    <th class="text-left px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Trạng thái</th>
                    <th class="text-left px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Ngày</th>
                    <th class="text-right px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Hành động</th>
                </tr>
            </thead>
            <tbody id="reportsTableBody">
                <tr><td colspan="7" class="px-6 py-12 text-center text-gray-400">Đang tải...</td></tr>
            </tbody>
        </table>
    </div>
    <div id="reportsPagination" class="flex items-center justify-between mt-4"></div>
</div>
