<!-- Confirm Modal -->
<div id="confirmModal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay bg-black/40">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md fade-in">
        <div class="flex items-center gap-3 mb-4">
            <div id="modalIcon" class="w-10 h-10 bg-red-100 rounded-xl flex items-center justify-center">
                <i class="fas fa-exclamation-triangle text-red-600"></i>
            </div>
            <h3 id="modalTitle" class="text-lg font-semibold text-gray-800">Xác nhận</h3>
        </div>
        <p id="modalMessage" class="text-gray-600 mb-6"></p>
        <div class="flex justify-end gap-3">
            <button onclick="closeModal()"
                class="px-5 py-2.5 border border-gray-200 rounded-xl text-gray-600 hover:bg-gray-50 transition font-medium">
                Hủy
            </button>
            <button id="modalConfirmBtn"
                class="px-5 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-xl transition font-medium">
                Xác nhận
            </button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="hidden fixed top-6 right-6 z-50 px-5 py-3 rounded-xl shadow-lg text-white font-medium fade-in"></div>
