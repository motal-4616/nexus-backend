<div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-500 via-primary-600 to-primary-800">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary-500 rounded-xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-halved text-2xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Nexus Admin</h1>
            <p class="text-gray-500 mt-1">Đăng nhập để quản lý hệ thống</p>
        </div>
        <div id="loginError" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-4 text-sm"></div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="loginEmail" placeholder="admin@nexus.com"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                <input type="password" id="loginPassword" placeholder="••••••••"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition" />
            </div>
            <button onclick="handleLogin()" id="loginBtn"
                class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-3 rounded-xl transition shadow-lg shadow-primary-500/30">
                Đăng nhập
            </button>
        </div>
    </div>
</div>
